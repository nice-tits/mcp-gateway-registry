# Local User Management Configuration
# This file defines users, their credentials, and group memberships
# for the MCP Gateway Registry authentication system

users:
  # Default admin user
  admin:
    password_hash: "$2b$12$rEvb/D5urDWuuruadQrGnetnV.E5BebAVPtox1FIU1Pjkfo0OHluO"  # Password: "admin"
    groups:
      - mcp-registry-admin
    enabled: true
    created_at: "2024-01-01T00:00:00Z"
    description: "Default administrator account"
  
  # Example service account for M2M authentication
  service_account_example:
    password_hash: "$2b$12$rUr7R1dxBq0YUlVJ03h/TOVlGyhl94iPf0flbP90n0uOnOS9UlmYe"  # Password: "service123"
    api_key: "mcp-api-key-example-12345abcdef"  # For API key authentication
    groups:
      - mcp-registry-service
    enabled: true
    created_at: "2024-01-01T00:00:00Z"
    description: "Example service account for machine-to-machine authentication"
    is_service_account: true

# Default password for 'admin' user is 'admin' (change in production)
# Default password for 'service_account_example' is 'service123' (change in production)
# To generate a new password hash, use: python -c "import bcrypt; print(bcrypt.hashpw(b'your_password', bcrypt.gensalt()).decode())"

# Group definitions are still maintained in scopes.yml
