<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MCP Gateway</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <style>
        .login-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-header">
             <img src="{{ url_for('static', path='/logo.png') }}" alt="MCP Gateway Logo" height="40" style="margin-bottom: 15px;">
            <h2>Welcome to MCP Gateway</h2>
            <p class="login-subtitle">Sign in with your admin credentials</p>
        </div>

        {% if error %}
        <p class="error-message">{{ error }}</p>
        {% endif %}

        <!-- Admin Login Form -->
        <form action="/login" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter admin username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter admin password">
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>

</body>
</html>
